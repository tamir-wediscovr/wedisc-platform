<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:#050A14;padding:16px;margin:0;font-family:Nunito}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sw{border-radius:12px;padding:12px;color:#fff;height:116px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06)}
.bg-app{background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%)}
.lbl{font-weight:700;font-size:12px}
.hex{font-weight:600;font-size:9px;opacity:0.85;letter-spacing:0.06em;text-transform:uppercase;font-variant-numeric:tabular-nums}
.role{font-size:9px;opacity:0.7;font-weight:600}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#050A14"><div><div class="lbl">Surface-0</div><div class="role">Status bar · deepest</div></div><div class="hex">#050A14</div></div>
  <div class="sw" style="background:#0A1628"><div><div class="lbl">Surface-1</div><div class="role">Card ground</div></div><div class="hex">#0A1628</div></div>
  <div class="sw" style="background:#081C2C"><div><div class="lbl">Surface-2</div><div class="role">Radial corner</div></div><div class="hex">#081C2C</div></div>
  <div class="sw" style="background:#1F4C69"><div><div class="lbl">Surface-3</div><div class="role">Radial teal center</div></div><div class="hex">#1F4C69</div></div>
  <div class="sw bg-app"><div><div class="lbl">App BG</div><div class="role">Radial gradient</div></div><div class="hex">RADIAL</div></div>
</div>
</body></html>
