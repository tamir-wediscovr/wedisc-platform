<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:#050A14;padding:20px;margin:0;font-family:Nunito}
.row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sw{border-radius:14px;padding:14px;color:#fff;height:104px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06)}
.lbl{font-weight:700;font-size:13px;letter-spacing:-0.01em}
.hex{font-weight:600;font-size:10px;opacity:0.75;letter-spacing:0.08em;text-transform:uppercase;font-variant-numeric:tabular-nums}
.role{font-size:10px;opacity:0.6;font-weight:600}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#0066FF"><div><div class="lbl">Blue</div><div class="role">Primary action · identity</div></div><div class="hex">#0066FF</div></div>
  <div class="sw" style="background:#FFFFFF;color:#0A1628"><div><div class="lbl">White</div><div class="role" style="color:rgba(10,22,40,0.6)">Text · structure</div></div><div class="hex">#FFFFFF</div></div>
  <div class="sw" style="background:#222222"><div><div class="lbl">Dark</div><div class="role">Ink · on light</div></div><div class="hex">#222222</div></div>
</div>
</body></html>
