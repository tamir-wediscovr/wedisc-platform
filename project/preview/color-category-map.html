<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);padding:18px;margin:0;font-family:Nunito;min-height:150px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.tick{display:flex;align-items:center;gap:10px;color:#fff;font-size:11px;font-weight:700}
.dot{width:10px;height:10px;border-radius:50%}
.label{font-size:9px;font-weight:600;opacity:0.55;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.pill{display:inline-flex;align-items:center;padding:5px 10px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:0.06em}
</style></head>
<body>
<div class="label">Category → color map</div>
<div class="grid">
  <div><div class="tick"><span class="dot" style="background:#6968CB"></span>Music</div><div class="pill" style="margin-top:8px;background:rgba(105,104,203,0.2);border:1px solid rgba(105,104,203,0.55);color:#6968CB">MUSIC</div></div>
  <div><div class="tick"><span class="dot" style="background:#FAC938"></span>Beauty</div><div class="pill" style="margin-top:8px;background:rgba(250,201,56,0.14);border:1px solid rgba(250,201,56,0.55);color:#FAC938">BEAUTY</div></div>
  <div><div class="tick"><span class="dot" style="background:#FF5501"></span>Food</div><div class="pill" style="margin-top:8px;background:rgba(255,85,1,0.18);border:1px solid rgba(255,85,1,0.55);color:#FF5501">FOOD</div></div>
  <div><div class="tick"><span class="dot" style="background:#7ED957"></span>Fitness/Yoga</div><div class="pill" style="margin-top:8px;background:rgba(126,217,87,0.18);border:1px solid rgba(126,217,87,0.65);color:#7ED957">FITNESS</div></div>
  <div><div class="tick"><span class="dot" style="background:#2C9CE4"></span>Next: [day]</div><div class="pill" style="margin-top:8px;background:rgba(44,152,228,0.18);border:1px solid rgba(44,152,228,0.55);color:#2C9CE4">NEXT: SAT</div></div>
</div>
</body></html>
