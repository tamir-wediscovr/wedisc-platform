<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:#0A1628;padding:20px;margin:0;font-family:Nunito;color:#fff}
.row{display:flex;gap:20px;flex-wrap:wrap}
.ico{display:flex;flex-direction:column;align-items:center;gap:6px}
.glyph{font-size:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:#fff}
.lbl{font-size:9px;color:rgba(255,255,255,0.5);font-weight:600;letter-spacing:0.06em;text-transform:uppercase}
</style></head>
<body>
<div class="row">
  <div class="ico"><div class="glyph">📍</div><div class="lbl">location</div></div>
  <div class="ico"><div class="glyph">🎁</div><div class="lbl">gift</div></div>
  <div class="ico"><div class="glyph" style="color:#FAC938">★</div><div class="lbl">DISC</div></div>
  <div class="ico"><div class="glyph" style="color:#7ED957">✓</div><div class="lbl">success</div></div>
  <div class="ico"><div class="glyph" style="color:#0066FF">→</div><div class="lbl">forward</div></div>
  <div class="ico"><div class="glyph" style="color:rgba(255,255,255,0.5)">·</div><div class="lbl">middot</div></div>
  <div class="ico"><div class="glyph" style="color:#FA2E2E">●</div><div class="lbl">notify</div></div>
</div>
<div style="margin-top:14px;font-size:10px;color:rgba(255,255,255,0.4);line-height:1.5">Inline unicode used as icons · stroke icons are Lucide (CDN) at 1.5–2px, 24×24 · substitution flagged, map original Figma vectors via fig_copy_files</div>
</body></html>
