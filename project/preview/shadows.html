<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);padding:24px;margin:0;font-family:Nunito;color:#fff}
.row{display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
.r{display:flex;flex-direction:column;align-items:center;gap:8px}
.card{width:86px;height:56px;border-radius:14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1)}
.lbl{font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.55)}
.val{font-size:10px;color:rgba(255,255,255,0.45);font-variant-numeric:tabular-nums}
</style></head>
<body>
<div class="row">
  <div class="r"><div class="card" style="box-shadow:0 8px 24px rgba(0,0,0,0.25)"></div><div class="lbl">card</div><div class="val">0 8 24 · 25%</div></div>
  <div class="r"><div class="card" style="box-shadow:0 6px 16px rgba(0,107,255,0.45);background:#0066FF;border:none"></div><div class="lbl">cta · blue</div><div class="val">0 6 16 · 45%</div></div>
  <div class="r"><div class="card" style="box-shadow:0 2px 10px rgba(255,102,0,0.5);background:linear-gradient(rgba(255,85,1,0.92),rgba(250,201,56,0.92));border:none"></div><div class="lbl">cta · hunt</div><div class="val">0 2 10 · 50%</div></div>
  <div class="r"><div class="card" style="box-shadow:0 0 10px 2px rgba(126,217,87,0.45);background:rgba(126,217,87,0.38);border:1px solid rgba(126,217,87,0.75)"></div><div class="lbl">live · green</div><div class="val">0 0 10 · 45%</div></div>
  <div class="r"><div class="card" style="box-shadow:0 4px 14px rgba(250,153,0,0.45);background:#FAC938;border:none"></div><div class="lbl">cta · gold</div><div class="val">0 4 14 · 45%</div></div>
</div>
</body></html>
