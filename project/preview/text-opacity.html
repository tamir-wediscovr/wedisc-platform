<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:#0A1628;padding:18px;margin:0;font-family:Nunito;color:#fff}
.row{display:flex;flex-direction:column;gap:8px}
.line{display:flex;align-items:baseline;gap:14px}
.k{width:74px;font-size:9px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.06em;text-transform:uppercase}
.v{flex:1}
.meta{color:rgba(255,255,255,0.45);font-size:10px;margin-left:8px;font-weight:400}
</style></head>
<body>
<div class="row">
  <div class="line"><div class="k">100%</div><div class="v" style="font-weight:700">The quick brown fox jumps<span class="meta">strong · 100%</span></div></div>
  <div class="line"><div class="k">70%</div><div class="v" style="color:rgba(255,255,255,0.7);font-weight:600">The quick brown fox jumps<span class="meta">muted · body</span></div></div>
  <div class="line"><div class="k">50%</div><div class="v" style="color:rgba(255,255,255,0.5);font-weight:600">The quick brown fox jumps<span class="meta">soft · labels</span></div></div>
  <div class="line"><div class="k">32%</div><div class="v" style="color:rgba(255,255,255,0.32)">The quick brown fox jumps<span class="meta">faint · timestamps</span></div></div>
  <div class="line"><div class="k">18%</div><div class="v" style="color:rgba(255,255,255,0.18)">The quick brown fox jumps<span class="meta">ghost · dividers</span></div></div>
</div>
</body></html>
