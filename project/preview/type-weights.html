<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:#0A1628;padding:20px;margin:0;color:#fff;font-family:Nunito}
.row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:12px}
.w{display:flex;flex-direction:column;gap:4px;align-items:flex-start}
.glyph{font-size:36px;line-height:1}
.lbl{font-size:9px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.06em;text-transform:uppercase}
.italic{color:rgba(255,255,255,0.7);font-size:16px;margin-top:8px}
</style></head>
<body>
<div class="row">
  <div class="w"><div class="glyph" style="font-weight:300">Aa</div><div class="lbl">Light 300</div></div>
  <div class="w"><div class="glyph" style="font-weight:400">Aa</div><div class="lbl">Regular 400</div></div>
  <div class="w"><div class="glyph" style="font-weight:600">Aa</div><div class="lbl">SemiBold 600</div></div>
  <div class="w"><div class="glyph" style="font-weight:700">Aa</div><div class="lbl">Bold 700</div></div>
  <div class="w"><div class="glyph" style="font-weight:800">Aa</div><div class="lbl">ExtraBold 800</div></div>
  <div class="w"><div class="glyph" style="font-weight:900">Aa</div><div class="lbl">Black 900</div></div>
</div>
<div class="italic"><span style="font-style:italic;font-weight:600">Italic supported across all weights</span></div>
</body></html>
