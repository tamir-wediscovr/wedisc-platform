<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);padding:24px;margin:0;font-family:Nunito;color:#fff}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g{height:110px;border-radius:20px;padding:14px;display:flex;flex-direction:column;justify-content:space-between;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 8px 24px rgba(0,0,0,0.25)}
.lbl{font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,0.55)}
.val{font-size:10px;color:rgba(255,255,255,0.45);font-variant-numeric:tabular-nums}
.h{font-size:14px;font-weight:700}
</style></head>
<body>
<div class="grid">
  <div class="g" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1)"><div class="h">Low</div><div><div class="lbl">Glass · low</div><div class="val">white 6% · blur 20</div></div></div>
  <div class="g" style="background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.14)"><div class="h">Medium</div><div><div class="lbl">Glass · med</div><div class="val">white 9% · blur 20</div></div></div>
  <div class="g" style="background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2)"><div class="h">High</div><div><div class="lbl">Glass · high</div><div class="val">white 12% · blur 20</div></div></div>
</div>
</body></html>
