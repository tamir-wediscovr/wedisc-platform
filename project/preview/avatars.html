<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);padding:18px;margin:0;font-family:Nunito;color:#fff}
.row{display:flex;gap:12px;align-items:center}
.av{width:56px;height:56px;border-radius:50%;background:#6968CB;border:2.5px solid #0066FF;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px}
.av.g{background:#FAC938;color:#0A1628}
.av.p{background:#FF5501;border-color:#FAC938}
.stack{display:flex;margin-left:12px}
.stack .s{width:32px;height:32px;border-radius:50%;border:2px solid #050A14;margin-left:-8px;background:#6968CB}
.stack .s:nth-child(2){background:#FAC938}
.stack .s:nth-child(3){background:#7ED957}
.stack .s:nth-child(4){background:#FF5501}
.name{font-size:11px;font-weight:700;margin-top:6px;text-align:center}
.tag{font-size:9px;color:rgba(0,102,255,0.85);text-align:center}
.col{display:flex;flex-direction:column;align-items:center}
</style></head>
<body>
<div class="row">
  <div class="col"><div class="av">E</div><div class="name">Emma</div><div class="tag">Explorer</div></div>
  <div class="col"><div class="av g">D</div><div class="name">Devonte</div><div class="tag">at Berlin 50</div></div>
  <div class="col"><div class="av p">K</div><div class="name">Kleo</div><div class="tag">at ELEV8</div></div>
  <div style="width:1px;height:60px;background:rgba(255,255,255,0.1);margin:0 6px"></div>
  <div style="font-size:10px;color:rgba(255,255,255,0.55);font-weight:700;letter-spacing:0.06em;text-transform:uppercase">+29 going</div>
  <div class="stack">
    <div class="s"></div><div class="s"></div><div class="s"></div><div class="s"></div>
  </div>
</div>
</body></html>
