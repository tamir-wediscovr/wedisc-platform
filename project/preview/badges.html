<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);padding:20px;margin:0;font-family:Nunito;color:#fff;display:flex;flex-direction:column;gap:14px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;padding:5px 10px;border-radius:6px;font-size:9px;font-weight:700;letter-spacing:0.06em;background:rgba(5,10,20,0.65);backdrop-filter:blur(8px)}
.live{background:rgba(126,217,87,0.38);border:1px solid rgba(126,217,87,0.75);color:#fff;box-shadow:0 0 10px 2px rgba(126,217,87,0.45);padding:5px 12px;border-radius:20px;height:24px}
.dot{width:8px;height:8px;border-radius:50%;background:#fff;margin-right:6px;box-shadow:0 0 0 3px rgba(126,217,87,0.28)}
.hunt{background:linear-gradient(rgba(255,85,1,0.92),rgba(250,201,56,0.92));border:1px solid rgba(250,201,56,0.45);color:#fff;box-shadow:0 2px 10px rgba(255,102,0,0.5);padding:5px 11px;border-radius:20px;height:24px}
</style></head>
<body>
<div class="row">
  <div class="pill live"><span class="dot"></span>LIVE</div>
  <div class="pill hunt">AR HUNT</div>
  <div class="pill" style="border:1px solid rgba(105,104,203,0.55);color:#6968CB">MUSIC</div>
  <div class="pill" style="border:1px solid rgba(250,201,56,0.55);color:#FAC938">BEAUTY</div>
  <div class="pill" style="border:1px solid rgba(255,85,1,0.55);color:#FF5501">FOOD</div>
  <div class="pill" style="border:1px solid rgba(126,217,87,0.65);color:#7ED957">FITNESS</div>
  <div class="pill" style="border:1px solid rgba(44,152,228,0.55);color:#2C9CE4">NEXT: SAT</div>
</div>
<div class="row">
  <div class="pill" style="background:rgba(105,104,203,0.2);border:1px solid rgba(105,104,203,0.35);color:#6968CB;border-radius:8px">CURATED</div>
  <div class="pill" style="background:rgba(126,217,87,0.18);border:1px solid rgba(126,217,87,0.65);color:#7ED957;padding:7px 12px;border-radius:14px;font-size:11px">✓  CLAIMED</div>
  <div class="pill" style="background:rgba(250,201,56,0.14);border:1px solid rgba(250,201,56,0.45);color:#FAC938;padding:5px 12px;border-radius:13px;font-size:11px">★  +300 DISC</div>
  <div class="pill" style="background:rgba(0,0,0,0.45);border:none;color:rgba(255,255,255,0.8);padding:4px 10px;border-radius:12px;font-size:11px">1 / 4</div>
</div>
</body></html>
