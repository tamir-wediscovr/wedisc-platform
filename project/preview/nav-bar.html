<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);padding:0;margin:0;font-family:Nunito;color:#fff;min-height:150px}
.nav{position:relative;width:402px;height:83px;margin:48px auto 0;background:rgba(5,10,20,0.88);border-top:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(28px);display:flex;padding:12px 0;box-shadow:0 -6px 20px rgba(0,0,0,0.35)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding-top:5px}
.icon{width:24px;height:24px;border-radius:6px;background:rgba(255,255,255,0.15)}
.icon.a{background:#0066FF}
.lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,0.4)}
.lbl.a{color:#0066FF}
</style></head>
<body>
<div class="nav">
  <div class="tab"><div class="icon a"></div><div class="lbl a">Home</div></div>
  <div class="tab"><div class="icon"></div><div class="lbl">Discover</div></div>
  <div class="tab"><div class="icon"></div><div class="lbl">Hunt</div></div>
  <div class="tab"><div class="icon"></div><div class="lbl">Passport</div></div>
  <div class="tab"><div class="icon"></div><div class="lbl">You</div></div>
</div>
</body></html>
