<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);padding:18px;margin:0;font-family:Nunito;color:#fff}
.card{width:370px;height:200px;border-radius:24px;overflow:hidden;position:relative;background:#6968CB}
.hero{position:absolute;inset:0;background:linear-gradient(135deg,#6968CB,#2C9CE4)}
.protect{position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,0.08) 0%,rgba(0,0,0,0.32) 40%,rgba(0,0,0,0.92) 100%)}
.top{position:absolute;top:14px;left:14px;display:flex;gap:8px}
.pill{padding:5px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:0.02em}
.live{background:rgba(126,217,87,0.38);border:1px solid rgba(126,217,87,0.75);box-shadow:0 0 10px 2px rgba(126,217,87,0.45)}
.hunt{background:linear-gradient(rgba(255,85,1,0.92),rgba(250,201,56,0.92));box-shadow:0 2px 10px rgba(255,102,0,0.5)}
.title{position:absolute;left:14px;bottom:56px;font-size:22px;font-weight:700}
.meta{position:absolute;left:14px;bottom:38px;font-size:11px;color:rgba(255,255,255,0.65)}
.cta{position:absolute;right:14px;bottom:14px;height:36px;padding:0 18px;border-radius:18px;background:linear-gradient(#006BFF,#7852F2);box-shadow:0 6px 16px rgba(0,107,255,0.45);display:flex;align-items:center;font-size:12px;font-weight:700}
.dist{position:absolute;top:18px;right:18px;font-size:10px;color:#fff;display:flex;align-items:center;gap:5px}
.dist::before{content:"";width:7px;height:7px;border-radius:50%;background:#1AB8FF}
</style></head>
<body>
<div class="card">
  <div class="hero"></div>
  <div class="protect"></div>
  <div class="top">
    <div class="pill live">● LIVE</div>
    <div class="pill hunt">AR HUNT</div>
  </div>
  <div class="dist">3km away</div>
  <div class="title">Berlin 50</div>
  <div class="meta">34 events · Apr–Jun 2026</div>
  <div class="cta">Join Berlin 50  →</div>
</div>
</body></html>
