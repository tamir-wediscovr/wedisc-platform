<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:#050A14;padding:16px;margin:0;font-family:Nunito}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sw{border-radius:12px;padding:12px;color:#fff;height:116px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid rgba(255,255,255,0.06)}
.lbl{font-weight:700;font-size:12px;letter-spacing:-0.01em}
.hex{font-weight:600;font-size:9px;opacity:0.85;letter-spacing:0.06em;text-transform:uppercase;font-variant-numeric:tabular-nums}
.role{font-size:9px;opacity:0.75;font-weight:600;line-height:1.3}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#6968CB"><div><div class="lbl">Purple</div><div class="role">XP · Levels · Curated · Music</div></div><div class="hex">#6968CB</div></div>
  <div class="sw" style="background:#FF5501"><div><div class="lbl">Orange</div><div class="role">Rewards · AR Hunt · Food</div></div><div class="hex">#FF5501</div></div>
  <div class="sw" style="background:#FAC938;color:#222"><div><div class="lbl">Gold</div><div class="role" style="color:rgba(34,34,34,0.7)">DISC · Premium · Beauty</div></div><div class="hex" style="color:rgba(34,34,34,0.8)">#FAC938</div></div>
  <div class="sw" style="background:#7ED957;color:#0A1628"><div><div class="lbl">Green</div><div class="role" style="color:rgba(10,22,40,0.7)">Success · Live · Fitness</div></div><div class="hex" style="color:rgba(10,22,40,0.8)">#7ED957</div></div>
  <div class="sw" style="background:#2C9CE4"><div><div class="lbl">Sky</div><div class="role">Location · AR · Next:[day]</div></div><div class="hex">#2C9CE4</div></div>
</div>
</body></html>
