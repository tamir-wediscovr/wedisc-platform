<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);padding:22px;margin:0;font-family:Nunito;color:#fff}
.col{display:flex;flex-direction:column;gap:10px}
.btn{height:52px;border-radius:26px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;border:1.5px solid rgba(255,255,255,0.2);cursor:pointer}
.primary{background:linear-gradient(#40A6FF,#0047E0);box-shadow:0 6px 16px rgba(0,38,128,0.55);color:#fff}
.alt{background:linear-gradient(#006BFF,#7852F2);box-shadow:0 6px 16px rgba(0,107,255,0.45);color:#fff}
.ghost{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.72);height:46px;font-size:14px}
.small{height:36px;padding:0 18px;border-radius:18px;background:linear-gradient(#006BFF,#7852F2);box-shadow:0 6px 16px rgba(0,107,255,0.45);font-size:12px;display:inline-flex;align-items:center;border:none}
.follow{height:32px;padding:0 16px;border-radius:20px;background:#0066FF;font-size:12px;display:inline-flex;align-items:center;border:none}
.row{display:flex;gap:8px}
</style></head>
<body>
<div class="col">
  <button class="btn primary">Redeem at Stand  →</button>
  <button class="btn alt">Join Berlin 50  →</button>
  <div class="row"><button class="small">Join Berlin 50 →</button><button class="follow">Follow</button><button class="ghost" style="padding:0 18px;font-size:12px">View Event →</button></div>
  <button class="btn ghost">I Want to Ship It to My Home</button>
</div>
</body></html>
