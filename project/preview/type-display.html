<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:#0A1628;padding:20px;margin:0;color:#fff;font-family:Nunito}
.row{display:flex;flex-direction:column;gap:10px}
.line{display:flex;align-items:baseline;gap:16px}
.k{width:82px;font-size:9px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.06em;text-transform:uppercase;flex-shrink:0}
.spec{margin-left:auto;font-size:10px;color:rgba(255,255,255,0.35);font-weight:500;font-variant-numeric:tabular-nums}
</style></head>
<body>
<div class="row">
  <div class="line"><div class="k">Display</div><div style="font-size:28px;font-weight:700;letter-spacing:-0.01em">Drop Pack</div><div class="spec">28 · 700</div></div>
  <div class="line"><div class="k">Title</div><div style="font-size:22px;font-weight:700">Hey Emma!</div><div class="spec">22 · 700</div></div>
  <div class="line"><div class="k">H1</div><div style="font-size:18px;font-weight:700">Caught Gift</div><div class="spec">18 · 700</div></div>
  <div class="line"><div class="k">H2</div><div style="font-size:16px;font-weight:700">Amazingy Pop-Up</div><div class="spec">16 · 700</div></div>
  <div class="line"><div class="k">H3</div><div style="font-size:14px;font-weight:700">Your People's Moments</div><div class="spec">14 · 700</div></div>
</div>
</body></html>
