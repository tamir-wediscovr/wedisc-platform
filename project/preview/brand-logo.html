<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:#050A14;display:flex;align-items:center;justify-content:center;padding:16px;gap:12px;height:150px}
.brand{display:flex;align-items:center;gap:10px}
.mark{width:72px;height:72px;border-radius:16px;background:#0A1628;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.08)}
.pill{display:inline-flex;align-items:center;height:34px;border:3px solid #0066FF;border-radius:9999px;background:#0A1628;overflow:hidden;padding:0;font-family:"Nunito";font-weight:800;font-size:15px;color:#fff;line-height:1}
.pill .we{padding:0 8px 0 10px;letter-spacing:-0.01em}
.pill .disc{background:#0066FF;padding:0 12px;height:100%;display:flex;align-items:center;color:#fff;letter-spacing:0.02em}
.caption{font-family:Nunito;color:rgba(255,255,255,0.55);font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
</style></head>
<body>
  <div class="brand">
    <div class="mark">
      <span class="pill"><span class="we">we</span><span class="disc">DISCOVR</span></span>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px">
      <span class="pill" style="height:28px;font-size:12px"><span class="we">we</span><span class="disc">DISCOVR</span></span>
      <div class="caption">Permission infrastructure</div>
    </div>
  </div>
</body></html>
