<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);padding:22px;margin:0;font-family:Nunito;color:#fff}
.wrap{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.r{display:flex;flex-direction:column;align-items:center;gap:6px}
.box{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);backdrop-filter:blur(20px)}
.lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:0.06em;text-transform:uppercase}
.val{font-size:10px;color:rgba(255,255,255,0.4);font-variant-numeric:tabular-nums}
</style></head>
<body>
<div class="wrap">
  <div class="r"><div class="box" style="width:40px;height:40px;border-radius:6px"></div><div class="lbl">xs</div><div class="val">6px</div></div>
  <div class="r"><div class="box" style="width:48px;height:48px;border-radius:8px"></div><div class="lbl">sm</div><div class="val">8px</div></div>
  <div class="r"><div class="box" style="width:56px;height:56px;border-radius:14px"></div><div class="lbl">md</div><div class="val">14px</div></div>
  <div class="r"><div class="box" style="width:64px;height:64px;border-radius:18px"></div><div class="lbl">lg</div><div class="val">18px</div></div>
  <div class="r"><div class="box" style="width:72px;height:72px;border-radius:20px"></div><div class="lbl">xl</div><div class="val">20px</div></div>
  <div class="r"><div class="box" style="width:80px;height:80px;border-radius:24px"></div><div class="lbl">2xl</div><div class="val">24px</div></div>
  <div class="r"><div class="box" style="width:88px;height:48px;border-radius:26px"></div><div class="lbl">cta</div><div class="val">26px</div></div>
  <div class="r"><div class="box" style="width:48px;height:48px;border-radius:9999px"></div><div class="lbl">pill</div><div class="val">full</div></div>
</div>
</body></html>
