<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
body{background:#050A14;padding:0;margin:0;font-family:Nunito;color:#fff;display:flex;justify-content:center;align-items:center;min-height:150px}
.phone{width:260px;height:560px;border-radius:36px;background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);overflow:hidden;position:relative;border:1px solid rgba(255,255,255,0.1);box-shadow:0 20px 60px rgba(0,0,0,0.5);transform:scale(0.25);transform-origin:center}
</style></head>
<body>
<div style="display:flex;gap:40px;align-items:center">
  <div style="font-size:12px;color:rgba(255,255,255,0.5);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;writing-mode:vertical-lr;transform:rotate(180deg)">iPhone 16 Pro · 402×874</div>
  <div style="position:relative;width:402px;height:140px;border-radius:36px;background:radial-gradient(#040F24 0%,#1F4C69 0%,#081C2C 100%);overflow:hidden;border:1px solid rgba(255,255,255,0.1)">
    <div style="height:48px;background:#050A14;display:flex;align-items:center;padding:0 20px;font-weight:700;font-size:15px">9:41</div>
    <div style="padding:12px 16px">
      <div style="font-weight:700;font-size:22px">Hey Emma!</div>
      <div style="font-size:11px;font-weight:700;color:rgba(126,217,87,0.9);margin-top:4px">3 new events are near you</div>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;font-size:10px;color:rgba(255,255,255,0.6);font-weight:600">
    <div>Margin · 16px</div>
    <div>Padding · 20px</div>
    <div>Status bar · 48px</div>
    <div>Tab bar · 83px</div>
  </div>
</div>
</body></html>
