<script type="text/babel">
// Platform primitives — all light-mode by default.
const { useState, useEffect, useMemo, createContext, useContext } = React;

const Btn = ({ children, variant = "primary", size = "md", icon, onClick, style = {}, disabled }) => {
  const h = size === "sm" ? 32 : size === "lg" ? 48 : 40;
  const vs = {
    primary: { bg: "#0066FF", color: "#fff", border: "none", hover: "#0054DD" },
    blue:    { bg: "#0066FF", color: "#fff", border: "none", hover: "#0054DD" },
    ghost:   { bg: "transparent", color: "var(--wd-ink)", border: "1px solid var(--wd-line-2)", hover: "var(--wd-pg-2)" },
    quiet:   { bg: "transparent", color: "var(--wd-ink-2)", border: "none", hover: "var(--wd-pg-2)" },
    danger:  { bg: "#FA2E2E", color: "#fff", border: "none", hover: "#DD1515" },
    success: { bg: "#7ED957", color: "#0B1220", border: "none", hover: "#6ECB47" },
    dark:    { bg: "#0B1220", color: "#fff", border: "none", hover: "#1C2536" },
  };
  const v = vs[variant];
  return (
    <button onClick={disabled ? undefined : onClick} disabled={disabled}
      style={{
        height: h, padding: size === "sm" ? "0 12px" : "0 16px",
        borderRadius: h / 2, fontFamily: "Nunito",
        fontWeight: 700, fontSize: size === "sm" ? 12 : 13,
        background: v.bg, color: v.color, border: v.border,
        display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6,
        cursor: disabled ? "not-allowed" : "pointer",
        opacity: disabled ? 0.5 : 1,
        transition: "background 180ms var(--wd-ease), transform 180ms var(--wd-ease)",
        whiteSpace: "nowrap", ...style,
      }}
      onMouseDown={e => e.currentTarget.style.transform = "scale(0.97)"}
      onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
      onMouseLeave={e => e.currentTarget.style.transform = "scale(1)"}
    >
      {icon && <Icon name={icon} size={size === "sm" ? 14 : 16} />}
      {children}
    </button>
  );
};

const Card = ({ children, style = {}, onClick, hover, padding = 20 }) => (
  <div onClick={onClick}
    style={{
      background: "var(--wd-surface)", border: "1px solid var(--wd-line)",
      borderRadius: 16, padding,
      transition: "border-color 180ms, box-shadow 180ms, transform 180ms",
      cursor: onClick ? "pointer" : "default", ...style,
    }}
    onMouseEnter={hover || onClick ? e => {
      e.currentTarget.style.borderColor = "var(--wd-line-2)";
      e.currentTarget.style.boxShadow = "0 4px 16px rgba(11,18,32,0.06)";
    } : undefined}
    onMouseLeave={hover || onClick ? e => {
      e.currentTarget.style.borderColor = "var(--wd-line)";
      e.currentTarget.style.boxShadow = "none";
    } : undefined}
  >
    {children}
  </div>
);

const StatCard = ({ label, value, delta, deltaKind = "neutral", sub, sparkColor = "#0066FF", spark, icon, tint }) => {
  const kinds = { up: "var(--wd-green-ink)", down: "#FA2E2E", neutral: "var(--wd-ink-3)" };
  return (
    <Card padding={20}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
        <span style={{ fontSize: 12, color: "var(--wd-ink-3)", fontWeight: 600 }}>{label}</span>
        {icon && (
          <div style={{ width: 28, height: 28, borderRadius: 8, background: tint || "var(--wd-pg-2)", display: "flex", alignItems: "center", justifyContent: "center", color: sparkColor }}>
            <Icon name={icon} size={14} />
          </div>
        )}
      </div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 10 }}>
        <span style={{ fontSize: 28, fontWeight: 700, color: "var(--wd-ink)", letterSpacing: "-0.01em" }}>{value}</span>
        {delta && <span style={{ fontSize: 12, fontWeight: 700, color: kinds[deltaKind] }}>{delta}</span>}
      </div>
      {spark && <Sparkline values={spark} color={sparkColor} />}
      {sub && <div style={{ fontSize: 11, color: "var(--wd-ink-4)", marginTop: spark ? 8 : 0 }}>{sub}</div>}
    </Card>
  );
};

const Sparkline = ({ values, color = "#0066FF", height = 28 }) => {
  const w = 100, h = height;
  const max = Math.max(...values), min = Math.min(...values);
  const range = max - min || 1;
  const pts = values.map((v, i) => [i * (w / (values.length - 1)), h - ((v - min) / range) * (h - 4) - 2]);
  const d = pts.map((p, i) => `${i ? "L" : "M"}${p[0]},${p[1]}`).join(" ");
  const area = `${d} L${w},${h} L0,${h} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none">
      <path d={area} fill={color} fillOpacity="0.1" />
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

const Pill = ({ children, color = "#0066FF", tint, style = {}, size = "md" }) => (
  <span style={{
    display: "inline-flex", alignItems: "center", gap: 4,
    padding: size === "sm" ? "2px 8px" : "4px 10px",
    background: tint || `${color}15`, color,
    borderRadius: 999, fontSize: size === "sm" ? 10 : 11, fontWeight: 700,
    whiteSpace: "nowrap", ...style,
  }}>{children}</span>
);

const CatPill = ({ cat, size = "md" }) => {
  const c = getCat(cat);
  if (!c) return null;
  return (
    <Pill color={c.color} tint={c.tintLt} size={size}>
      <span style={{ width: 6, height: 6, borderRadius: 3, background: c.color }} />
      {c.name}
    </Pill>
  );
};

const StatusPill = ({ status, size = "md" }) => {
  const s = STATUS[status]; if (!s) return null;
  const dot = status === "live";
  return (
    <Pill color={s.color} tint={s.tint} size={size}>
      {dot && <span className="pulse" style={{ width: 6, height: 6, borderRadius: 3, background: s.color }} />}
      {s.label}
    </Pill>
  );
};

const Avatar = ({ name, imgSrc, color = "#6968CB", size = 36, ring }) => {
  const initials = name ? name.split(" ").map(s => s[0]).slice(0, 2).join("") : "";
  const baseStyle = {
    width: size, height: size, flexShrink: 0,
    borderRadius: size, background: color,
    border: ring ? `2px solid ${ring}` : "none",
    display: "flex", alignItems: "center", justifyContent: "center",
    color: "#fff", fontWeight: 700, fontSize: size * 0.4,
    overflow: "hidden", position: "relative",
  };
  if (imgSrc) {
    return (
      <div style={baseStyle}>
        <img src={imgSrc} alt={name || ""} style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />
      </div>
    );
  }
  return <div style={baseStyle}>{initials}</div>;
};

const Bar = ({ value, color = "#0066FF", height = 6, bg = "var(--wd-pg-2)" }) => (
  <div style={{ height, background: bg, borderRadius: height / 2, overflow: "hidden" }}>
    <div style={{ height: "100%", width: `${Math.min(100, value)}%`, background: color, borderRadius: height / 2, transition: "width 400ms var(--wd-ease)" }} />
  </div>
);

const SegmentedControl = ({ options, value, onChange, size = "md" }) => (
  <div style={{ display: "inline-flex", padding: 3, background: "var(--wd-pg-2)", borderRadius: 10 }}>
    {options.map(o => (
      <button key={o.value} onClick={() => onChange(o.value)}
        style={{
          height: size === "sm" ? 28 : 34, padding: "0 14px",
          border: "none", fontFamily: "Nunito", fontWeight: 700,
          fontSize: size === "sm" ? 12 : 13,
          color: value === o.value ? "var(--wd-ink)" : "var(--wd-ink-3)",
          background: value === o.value ? "var(--wd-surface)" : "transparent",
          borderRadius: 8, cursor: "pointer",
          boxShadow: value === o.value ? "0 1px 3px rgba(11,18,32,0.1)" : "none",
          transition: "all 180ms var(--wd-ease)",
        }}>
        {o.label}
      </button>
    ))}
  </div>
);

const Field = ({ label, children, required, hint }) => (
  <label style={{ display: "block", marginBottom: 18 }}>
    <div style={{ fontSize: 12, fontWeight: 700, color: "var(--wd-ink-2)", marginBottom: 8 }}>
      {label}{required && <span style={{ color: "#FA2E2E", marginLeft: 3 }}>*</span>}
    </div>
    {children}
    {hint && <div style={{ fontSize: 11, color: "var(--wd-ink-4)", marginTop: 6 }}>{hint}</div>}
  </label>
);

const Input = ({ value, onChange, placeholder, style = {} }) => (
  <input value={value} onChange={e => onChange && onChange(e.target.value)} placeholder={placeholder}
    style={{
      width: "100%", height: 40, padding: "0 14px",
      background: "var(--wd-surface)", border: "1px solid var(--wd-line-2)",
      borderRadius: 10, fontFamily: "Nunito", fontSize: 13, color: "var(--wd-ink)",
      outline: "none", transition: "border-color 180ms", ...style,
    }}
    onFocus={e => e.target.style.borderColor = "#0066FF"}
    onBlur={e => e.target.style.borderColor = "var(--wd-line-2)"}
  />
);

const Textarea = ({ value, onChange, placeholder, rows = 4 }) => (
  <textarea value={value} onChange={e => onChange && onChange(e.target.value)} placeholder={placeholder} rows={rows}
    style={{
      width: "100%", padding: 12,
      background: "var(--wd-surface)", border: "1px solid var(--wd-line-2)",
      borderRadius: 10, fontFamily: "Nunito", fontSize: 13,
      color: "var(--wd-ink)", outline: "none", resize: "vertical", lineHeight: 1.5,
    }}
    onFocus={e => e.target.style.borderColor = "#0066FF"}
    onBlur={e => e.target.style.borderColor = "var(--wd-line-2)"}
  />
);

const Chip = ({ children, selected, onClick, icon }) => (
  <button onClick={onClick}
    style={{
      height: 36, padding: "0 14px",
      background: selected ? "rgba(0,102,255,0.08)" : "var(--wd-surface)",
      border: selected ? "1px solid #0066FF" : "1px solid var(--wd-line-2)",
      borderRadius: 20, fontFamily: "Nunito", fontSize: 13, fontWeight: 600,
      color: selected ? "#0066FF" : "var(--wd-ink-2)",
      cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 6,
      transition: "all 180ms",
    }}>
    {icon && <Icon name={icon} size={14} />}
    {children}
  </button>
);

const Divider = ({ vertical, style = {} }) => (
  <div style={{
    background: "var(--wd-line)",
    ...(vertical ? { width: 1, height: "100%" } : { height: 1, width: "100%", margin: "16px 0" }),
    ...style,
  }} />
);

const PageHeader = ({ title, sub, actions }) => (
  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 28, gap: 16, flexWrap: "wrap" }}>
    <div>
      <h1 style={{ margin: 0, fontSize: 28, fontWeight: 700, color: "var(--wd-ink)", letterSpacing: "-0.02em" }}>{title}</h1>
      {sub && <p style={{ margin: "6px 0 0", fontSize: 14, color: "var(--wd-ink-3)" }}>{sub}</p>}
    </div>
    {actions && <div style={{ display: "flex", gap: 8 }}>{actions}</div>}
  </div>
);

const Row = ({ children, gap = 12, style = {}, align = "center", wrap }) => (
  <div style={{ display: "flex", alignItems: align, gap, flexWrap: wrap ? "wrap" : "nowrap", ...style }}>
    {children}
  </div>
);

const Stack = ({ children, gap = 12, style = {} }) => (
  <div style={{ display: "flex", flexDirection: "column", gap, ...style }}>
    {children}
  </div>
);

Object.assign(window, {
  Btn, Card, StatCard, Sparkline, Pill, CatPill, StatusPill, Avatar, Bar,
  SegmentedControl, Field, Input, Textarea, Chip, Divider, PageHeader, Row, Stack,
});
</script>

<script type="text/babel">
// wSI visualization — three variants. Each takes the same event data shape.
// The Tweak "wsi_variant" switches between them.
// Dimensions: Audience Fit (EPI+BSI, 25%), Revenue (DAS+BSI, 20%), Track (CPI, 20%),
// Venue (SVI, 15%), Completeness (DAS, 5%), Depth (EPI+DAS, 10%), Halo/Spend (SVI+POS, 5%).

const WSI_DIMS = [
  { key: "audienceFit",  label: "Audience-Brand Fit", index: "EPI·BSI", w: 25 },
  { key: "revenue",      label: "Revenue potential",  index: "DAS·BSI", w: 20 },
  { key: "track",        label: "Curator track",      index: "CPI",     w: 20 },
  { key: "venue",        label: "Space quality",      index: "SVI",     w: 15 },
  { key: "depth",        label: "Community depth",    index: "EPI·DAS", w: 10 },
  { key: "halo",         label: "Venue halo",         index: "SVI·POS", w:  5 },
  { key: "completeness", label: "Completeness",       index: "DAS",     w:  5 },
];

// Variant A: score badge + bar list
const WSI_A = ({ ev, compact }) => (
  <div>
    <Row gap={16} align="center" style={{ marginBottom: compact ? 12 : 20 }}>
      <WSIScoreBadge value={ev.wsi} size={compact ? 58 : 76} />
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 12, color: "var(--wd-ink-4)", fontWeight: 600, marginBottom: 4 }}>wSI MATCH</div>
        <div style={{ fontSize: 16, fontWeight: 700, color: "var(--wd-ink)" }}>{scoreLabel(ev.wsi)}</div>
        <div style={{ fontSize: 12, color: "var(--wd-ink-3)", marginTop: 2 }}>Signal Index · {WSI_DIMS.length} inputs</div>
      </div>
    </Row>
    <Stack gap={10}>
      {WSI_DIMS.map(d => (
        <div key={d.key}>
          <Row style={{ justifyContent: "space-between", marginBottom: 5 }}>
            <span style={{ fontSize: 12, color: "var(--wd-ink-2)", fontWeight: 600 }}>{d.label}</span>
            <Row gap={8}>
              <span style={{ fontSize: 10, color: "var(--wd-ink-4)", fontWeight: 700, letterSpacing: "0.04em" }}>{d.index}</span>
              <span style={{ fontSize: 12, color: "var(--wd-ink)", fontWeight: 700, width: 30, textAlign: "right" }}>{ev[d.key]}</span>
            </Row>
          </Row>
          <Bar value={ev[d.key]} color={barColor(ev[d.key])} height={5} />
        </div>
      ))}
    </Stack>
  </div>
);

// Variant B: radar chart
const WSI_B = ({ ev }) => {
  const size = 220, cx = size / 2, cy = size / 2, r = 82;
  const n = WSI_DIMS.length;
  const rings = [0.25, 0.5, 0.75, 1.0];
  const pts = WSI_DIMS.map((d, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    const v = ev[d.key] / 100;
    return [cx + Math.cos(a) * r * v, cy + Math.sin(a) * r * v];
  });
  const labelPts = WSI_DIMS.map((_, i) => {
    const a = (i / n) * Math.PI * 2 - Math.PI / 2;
    return [cx + Math.cos(a) * (r + 20), cy + Math.sin(a) * (r + 20)];
  });
  const poly = pts.map(p => p.join(",")).join(" ");
  return (
    <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ position: "relative" }}>
        <svg width={size} height={size}>
          {rings.map((rr, i) => (
            <polygon key={i}
              points={Array.from({length: n}, (_, j) => {
                const a = (j / n) * Math.PI * 2 - Math.PI / 2;
                return [cx + Math.cos(a) * r * rr, cy + Math.sin(a) * r * rr].join(",");
              }).join(" ")}
              fill="none" stroke="var(--wd-line)" strokeWidth={i === 3 ? 1.5 : 1} />
          ))}
          {WSI_DIMS.map((_, i) => {
            const a = (i / n) * Math.PI * 2 - Math.PI / 2;
            return <line key={i} x1={cx} y1={cy} x2={cx + Math.cos(a) * r} y2={cy + Math.sin(a) * r} stroke="var(--wd-line)" strokeWidth="1" />;
          })}
          <polygon points={poly} fill="rgba(0,102,255,0.15)" stroke="#0066FF" strokeWidth="1.75" strokeLinejoin="round" />
          {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="3" fill="#0066FF" />)}
          {labelPts.map((p, i) => (
            <text key={i} x={p[0]} y={p[1]} textAnchor="middle" dominantBaseline="middle"
              fontSize="9.5" fontFamily="Nunito" fontWeight="700" fill="var(--wd-ink-3)">
              {WSI_DIMS[i].index}
            </text>
          ))}
          <text x={cx} y={cy - 2} textAnchor="middle" fontSize="24" fontFamily="Nunito" fontWeight="700" fill="var(--wd-ink)" letterSpacing="-0.02em">{ev.wsi}</text>
          <text x={cx} y={cy + 14} textAnchor="middle" fontSize="9" fontFamily="Nunito" fontWeight="700" fill="var(--wd-ink-4)" letterSpacing="0.08em">WSI MATCH</text>
        </svg>
      </div>
      <div style={{ marginTop: 8, fontSize: 12, color: "var(--wd-ink-3)" }}>{scoreLabel(ev.wsi)}</div>
    </div>
  );
};

// Variant C: single ring + fit reasons (compact)
const WSI_C = ({ ev }) => {
  const reasons = topReasons(ev);
  return (
    <Row gap={20} align="flex-start">
      <WSIRing value={ev.wsi} size={108} />
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 11, color: "var(--wd-ink-4)", fontWeight: 700, letterSpacing: "0.06em", marginBottom: 4 }}>WSI MATCH</div>
        <div style={{ fontSize: 15, fontWeight: 700, color: "var(--wd-ink)", marginBottom: 12 }}>{scoreLabel(ev.wsi)}</div>
        <div style={{ fontSize: 11, color: "var(--wd-ink-4)", fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 }}>TOP FIT REASONS</div>
        <Stack gap={6}>
          {reasons.map(r => (
            <Row key={r.key} gap={8}>
              <Icon name="check" size={14} color="var(--wd-green-ink)" />
              <span style={{ fontSize: 12, color: "var(--wd-ink-2)" }}>{r.msg}</span>
            </Row>
          ))}
        </Stack>
      </div>
    </Row>
  );
};

const WSIScoreBadge = ({ value, size = 60 }) => {
  const color = barColor(value);
  return (
    <div style={{
      width: size, height: size, borderRadius: size / 2,
      background: `${color}12`, border: `2px solid ${color}`,
      display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      flexShrink: 0,
    }}>
      <div style={{ fontSize: size * 0.36, fontWeight: 700, color, lineHeight: 1, letterSpacing: "-0.02em" }}>{value}</div>
      <div style={{ fontSize: Math.max(7, size * 0.12), fontWeight: 700, color: "var(--wd-ink-4)", letterSpacing: "0.08em", marginTop: 2 }}>wSI</div>
    </div>
  );
};

const WSIRing = ({ value, size = 100, stroke = 8 }) => {
  const r = (size - stroke) / 2, c = 2 * Math.PI * r;
  const pct = value / 100;
  const color = barColor(value);
  return (
    <svg width={size} height={size}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--wd-pg-2)" strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${c * pct} ${c}`} strokeLinecap="round"
        transform={`rotate(-90 ${size/2} ${size/2})`} />
      <text x={size/2} y={size/2 - 2} textAnchor="middle" fontSize={size * 0.28} fontFamily="Nunito"
        fontWeight="700" fill="var(--wd-ink)" dominantBaseline="middle" letterSpacing="-0.02em">
        {value}
      </text>
      <text x={size/2} y={size/2 + size * 0.2} textAnchor="middle" fontSize="9" fontFamily="Nunito"
        fontWeight="700" fill="var(--wd-ink-4)" letterSpacing="0.08em">wSI</text>
    </svg>
  );
};

const barColor = (v) => v >= 85 ? "var(--wd-green-ink)" : v >= 70 ? "#0066FF" : v >= 55 ? "var(--wd-gold-ink)" : "var(--wd-orange-ink)";
const scoreLabel = (v) => v >= 85 ? "Exceptional fit" : v >= 75 ? "Strong fit" : v >= 65 ? "Good fit" : v >= 55 ? "Fair fit" : "Weak fit";

const topReasons = (ev) => {
  const sorted = [...WSI_DIMS].sort((a, b) => ev[b.key] - ev[a.key]).slice(0, 3);
  return sorted.map(d => ({
    key: d.key,
    msg: d.key === "audienceFit" ? `Audience overlap ${ev[d.key]}% with brand target`
       : d.key === "revenue"     ? `Revenue potential ${ev[d.key]}% above baseline`
       : d.key === "track"       ? `Curator track record scores ${ev[d.key]}`
       : d.key === "venue"       ? `Space index (SVI) at ${ev[d.key]}`
       : d.key === "depth"       ? `Expected engagement depth ${ev[d.key]}%`
       : d.key === "halo"        ? `Spend-per-head index ${ev[d.key]}`
       : `Brief completeness ${ev[d.key]}%`,
  }));
};

// Router
const WSI = ({ ev, variant = "bars", compact }) => {
  if (variant === "radar")   return <WSI_B ev={ev} />;
  if (variant === "reasons") return <WSI_C ev={ev} />;
  return <WSI_A ev={ev} compact={compact} />;
};

Object.assign(window, { WSI, WSIScoreBadge, WSIRing, WSI_DIMS, barColor, scoreLabel, topReasons });
</script>

<script type="text/babel">
// Create Event wizard — full clickthrough: format → brief → space → review → submit.
const CreateEvent = ({ onDone, onCancel }) => {
  const [step, setStep] = useState(0);
  const [data, setData] = useState({
    format: "listening",
    title: "Vinyl & Neighbors",
    desc: "Warm-up listening set with guest selector. Open doors, soft start.",
    date: "May 23 · Fri 20:00",
    cap: 120,
    neighborhood: "Neukölln",
    spaceChoice: "partner",
    space: "s3",
    ticket: "€16",
    targetAge: "25–40",
    nogo: ["alcohol_heavy"],
    noGoCategories: [],
  });

  const steps = ["Format", "Brief", "Space", "Review"];
  const update = (k, v) => setData(d => ({ ...d, [k]: v }));

  return (
    <>
      <PageHeader
        title="Create Event"
        sub="Build the brief. We'll route space + brand matches automatically."
        actions={<Btn variant="ghost" icon="x" onClick={onCancel}>Cancel</Btn>}
      />

      <Row gap={8} style={{ marginBottom: 28 }}>
        {steps.map((s, i) => (
          <Row key={i} gap={10} style={{ flex: 1, alignItems: "center" }}>
            <div style={{
              width: 28, height: 28, borderRadius: 14,
              background: i <= step ? "#0066FF" : "var(--wd-pg-2)",
              color: i <= step ? "#fff" : "var(--wd-ink-3)",
              display: "flex", alignItems: "center", justifyContent: "center",
              fontSize: 12, fontWeight: 700,
            }}>{i < step ? "✓" : i + 1}</div>
            <div style={{ fontSize: 12, fontWeight: 700, color: i <= step ? "var(--wd-ink)" : "var(--wd-ink-4)" }}>{s}</div>
            {i < steps.length - 1 && <div style={{ flex: 1, height: 2, background: i < step ? "#0066FF" : "var(--wd-line)", borderRadius: 1 }} />}
          </Row>
        ))}
      </Row>

      <Card>
        {step === 0 && <StepFormat data={data} update={update} />}
        {step === 1 && <StepBrief  data={data} update={update} />}
        {step === 2 && <StepSpace  data={data} update={update} />}
        {step === 3 && <StepReview data={data} />}

        <Divider />
        <Row style={{ justifyContent: "space-between" }}>
          <Btn variant="ghost" onClick={() => step > 0 ? setStep(step - 1) : onCancel()}>
            {step === 0 ? "Cancel" : "← Back"}
          </Btn>
          <Row gap={8}>
            <span style={{ fontSize: 12, color: "var(--wd-ink-4)" }}>Step {step + 1} of {steps.length}</span>
            <Btn onClick={() => step < steps.length - 1 ? setStep(step + 1) : onDone()} icon={step === steps.length - 1 ? "check" : "arrowRight"}>
              {step === steps.length - 1 ? "Submit for QA" : "Continue"}
            </Btn>
          </Row>
        </Row>
      </Card>
    </>
  );
};

const StepFormat = ({ data, update }) => (
  <>
    <h3 style={{ margin: "0 0 6px", fontSize: 18, fontWeight: 700, color: "var(--wd-ink)" }}>Pick a format</h3>
    <p style={{ margin: "0 0 20px", fontSize: 13, color: "var(--wd-ink-3)" }}>Format presets duration, capacity ranges, and space requirements. You can adjust later.</p>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 12 }}>
      {FORMATS.map(f => {
        const on = data.format === f.id;
        return (
          <button key={f.id} onClick={() => update("format", f.id)}
            style={{
              textAlign: "left", padding: 16,
              background: on ? "rgba(0,102,255,0.05)" : "var(--wd-surface)",
              border: on ? "1.5px solid #0066FF" : "1px solid var(--wd-line-2)",
              borderRadius: 12, cursor: "pointer", fontFamily: "Nunito",
              transition: "all 180ms",
            }}>
            <div style={{ fontSize: 15, fontWeight: 700, color: "var(--wd-ink)", marginBottom: 6 }}>{f.name}</div>
            <div style={{ fontSize: 12, color: "var(--wd-ink-3)", marginBottom: 12, minHeight: 32 }}>{f.desc}</div>
            <Row gap={10}>
              <span style={{ fontSize: 11, color: "var(--wd-ink-4)" }}><Icon name="clock" size={11} style={{ display: "inline", verticalAlign: "middle", marginRight: 3 }}/> {f.dur}</span>
              <span style={{ fontSize: 11, color: "var(--wd-ink-4)" }}><Icon name="users2" size={11} style={{ display: "inline", verticalAlign: "middle", marginRight: 3 }}/> {f.cap}</span>
            </Row>
          </button>
        );
      })}
    </div>
  </>
);

const StepBrief = ({ data, update }) => (
  <>
    <h3 style={{ margin: "0 0 6px", fontSize: 18, fontWeight: 700, color: "var(--wd-ink)" }}>Event brief</h3>
    <p style={{ margin: "0 0 20px", fontSize: 13, color: "var(--wd-ink-3)" }}>Fill the required fields. Optional fields strengthen brand matching.</p>
    <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 24 }}>
      <div>
        <Field label="Event name" required>
          <Input value={data.title} onChange={v => update("title", v)} />
        </Field>
        <Field label="Description" required hint="One-liner + short description. ~2-3 sentences.">
          <Textarea value={data.desc} onChange={v => update("desc", v)} rows={4} />
        </Field>
        <Row gap={16}>
          <div style={{ flex: 1 }}>
            <Field label="Date" required>
              <Input value={data.date} onChange={v => update("date", v)} />
            </Field>
          </div>
          <div style={{ flex: 1 }}>
            <Field label="Capacity" required>
              <Input value={data.cap} onChange={v => update("cap", v)} />
            </Field>
          </div>
        </Row>
      </div>
      <div>
        <Field label="Neighborhood" required>
          <Input value={data.neighborhood} onChange={v => update("neighborhood", v)} />
        </Field>
        <Field label="Ticket price" hint="Use 'Free' or 'RSVP' for no ticket.">
          <Input value={data.ticket} onChange={v => update("ticket", v)} />
        </Field>
        <Field label="Target audience" hint="Strengthens brand matching.">
          <Input value={data.targetAge} onChange={v => update("targetAge", v)} />
        </Field>
        <Field label="No-go brand categories">
          <Row gap={6} wrap>
            {["Alcohol", "Gambling", "Fast food", "Crypto"].map(c => {
              const on = data.noGoCategories.includes(c);
              return <Chip key={c} selected={on} onClick={() => update("noGoCategories", on ? data.noGoCategories.filter(x => x !== c) : [...data.noGoCategories, c])}>{c}</Chip>;
            })}
          </Row>
        </Field>
      </div>
    </div>
  </>
);

const StepSpace = ({ data, update }) => (
  <>
    <h3 style={{ margin: "0 0 6px", fontSize: 18, fontWeight: 700, color: "var(--wd-ink)" }}>Choose a space</h3>
    <p style={{ margin: "0 0 20px", fontSize: 13, color: "var(--wd-ink-3)" }}>Apply to partner spaces (recommended) or use your own.</p>
    <Row gap={10} style={{ marginBottom: 20 }}>
      <Chip selected={data.spaceChoice === "partner"} onClick={() => update("spaceChoice", "partner")} icon="building">Apply to partner spaces</Chip>
      <Chip selected={data.spaceChoice === "own"} onClick={() => update("spaceChoice", "own")} icon="location">Use my own space</Chip>
    </Row>
    {data.spaceChoice === "partner" && (
      <>
        <div style={{ fontSize: 12, fontWeight: 700, color: "var(--wd-ink-4)", letterSpacing: "0.06em", marginBottom: 12 }}>RECOMMENDED · 3 top matches for {data.neighborhood}</div>
        <Stack gap={10}>
          {SPACES.slice(0, 3).map(s => {
            const on = data.space === s.id;
            const match = 82 + (s.svi % 5);
            return (
              <div key={s.id} onClick={() => update("space", s.id)}
                style={{
                  display: "flex", gap: 16, padding: 16,
                  background: on ? "rgba(0,102,255,0.04)" : "var(--wd-surface)",
                  border: on ? "1.5px solid #0066FF" : "1px solid var(--wd-line-2)",
                  borderRadius: 12, cursor: "pointer", alignItems: "center",
                }}>
                <div style={{ width: 72, height: 72, borderRadius: 10, flexShrink: 0, overflow: "hidden", backgroundColor: "var(--wd-pg-2)", backgroundImage: s.img ? `url(${s.img})` : "none", backgroundSize: "cover", backgroundPosition: "center", position: "relative" }}>
                  {/* category stripe as identity */}
                  <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: s.color }} />
                </div>
                <div style={{ flex: 1 }}>
                  <Row gap={8} style={{ marginBottom: 4 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: "var(--wd-ink)" }}>{s.name}</div>
                    <Pill color="#5B6476" tint="var(--wd-pg-2)" size="sm">{s.type}</Pill>
                  </Row>
                  <Row gap={12}>
                    <span style={{ fontSize: 12, color: "var(--wd-ink-3)" }}>{s.n}</span>
                    <span style={{ fontSize: 12, color: "var(--wd-ink-3)" }}>· cap {s.cap}</span>
                    <span style={{ fontSize: 12, color: "var(--wd-ink-3)" }}>· SVI {s.svi}</span>
                  </Row>
                  <div style={{ fontSize: 11, color: "var(--wd-ink-4)", marginTop: 8 }}>
                    Equipment: {s.equipment.join(", ")}
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <WSIScoreBadge value={match} size={56} />
                  <div style={{ fontSize: 10, color: "var(--wd-ink-4)", fontWeight: 700, letterSpacing: "0.06em", marginTop: 6 }}>MATCH</div>
                </div>
              </div>
            );
          })}
        </Stack>
      </>
    )}
    {data.spaceChoice === "own" && (
      <Stack gap={14}>
        <Field label="Venue address" required><Input value="Weserstr. 104, 12045 Berlin" /></Field>
        <Row gap={16}>
          <div style={{ flex: 1 }}><Field label="Capacity" required><Input value="60" /></Field></div>
          <div style={{ flex: 1 }}><Field label="Type" required><Input value="Studio / gallery" /></Field></div>
        </Row>
      </Stack>
    )}
  </>
);

const StepReview = ({ data }) => {
  const space = getSpace(data.space);
  return (
    <>
      <h3 style={{ margin: "0 0 6px", fontSize: 18, fontWeight: 700, color: "var(--wd-ink)" }}>Review & submit</h3>
      <p style={{ margin: "0 0 20px", fontSize: 13, color: "var(--wd-ink-3)" }}>Once submitted the event enters QA review. On approval it goes live to Explorers and the Sponsor Feed.</p>
      <Stack gap={14}>
        <ReviewBlock label="Format" value={FORMATS.find(f => f.id === data.format).name} />
        <ReviewBlock label="Title" value={data.title} />
        <ReviewBlock label="Description" value={data.desc} />
        <Row gap={14}>
          <div style={{ flex: 1 }}><ReviewBlock label="Date" value={data.date} /></div>
          <div style={{ flex: 1 }}><ReviewBlock label="Capacity" value={data.cap} /></div>
          <div style={{ flex: 1 }}><ReviewBlock label="Ticket" value={data.ticket} /></div>
        </Row>
        <ReviewBlock label="Space" value={data.spaceChoice === "partner" ? `${space.name} · ${space.n}` : "Own space"} />
      </Stack>

      <div style={{ marginTop: 20, padding: 14, background: "rgba(0,102,255,0.05)", border: "1px solid rgba(0,102,255,0.2)", borderRadius: 12 }}>
        <Row gap={10}>
          <Icon name="shield" size={18} color="#0066FF" />
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "var(--wd-ink)", marginBottom: 2 }}>Next: QA review</div>
            <div style={{ fontSize: 12, color: "var(--wd-ink-3)" }}>
              {data.spaceChoice === "partner" ? "Space confirms, then QA reviews." : "QA reviews directly, no space step needed."} Typical turnaround: under 24h.
            </div>
          </div>
        </Row>
      </div>
    </>
  );
};

const ReviewBlock = ({ label, value }) => (
  <div>
    <div style={{ fontSize: 11, color: "var(--wd-ink-4)", fontWeight: 700, letterSpacing: "0.06em", marginBottom: 4 }}>{label.toUpperCase()}</div>
    <div style={{ fontSize: 14, color: "var(--wd-ink)", fontWeight: 500 }}>{value}</div>
  </div>
);

Object.assign(window, { CreateEvent });
</script>

<script type="text/babel">
// Space Calendar + Requests.
//
// COLOR LOGIC
// -----------
// Calendar cells are colored by STATUS only (status = state):
//   • Available  → soft green tint
//   • Booked     → neutral ink-filled cell
//   • Pending    → amber (separate from Food orange to avoid conflict)
//   • Blocked    → flat neutral grey
// The event CATEGORY on booked days appears as a thin 3px stripe on the left
// edge of the cell (identity, secondary). Never as the main fill.

const SpaceCalendar = () => {
  // days 1..31 (May 2026 layout — starts Fri col 5)
  const pad = Array.from({length: 4}, (_, i) => null);
  const days = pad.concat(Array.from({length: 31}, (_, i) => i + 1));
  const booked = { 2: "food", 8: "music", 9: "music", 15: "culture", 17: "food", 23: "fitness", 27: "music", 28: "beauty" };
  const pendingDays = [14, 21];
  const blockedDays = [5, 12]; // private / closed days
  const available = [3, 4, 6, 7, 10, 11, 13, 16, 18, 19, 20, 22, 24, 25, 26, 29, 30, 31];

  return (
    <>
      <PageHeader
        title="Calendar"
        sub="Urban Spree · Friedrichshain · cap 450. Mark available slots to receive curator requests."
        actions={<><Btn variant="ghost" icon="upload">Sync iCal</Btn><Btn icon="plus">Open new slot</Btn></>}
      />

      <div style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 20 }}>
        <Card>
          <Row style={{ justifyContent: "space-between", marginBottom: 18 }}>
            <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>May 2026</h3>
            <Row gap={14}>
              <LegendChip swatch="avail"    label="Available"/>
              <LegendChip swatch="booked"   label="Booked"/>
              <LegendChip swatch="pending"  label="Pending"/>
              <LegendChip swatch="blocked"  label="Blocked"/>
            </Row>
          </Row>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, marginBottom: 6 }}>
            {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d =>
              <div key={d} style={{ fontSize: 10, fontWeight: 700, color: "var(--wd-ink-4)", letterSpacing: "0.06em", textAlign: "center", padding: "6px 0" }}>{d.toUpperCase()}</div>)}
          </div>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
            {days.map((d, idx) => {
              if (d === null) return <div key={`pad-${idx}`}/>;
              const bk = booked[d];
              const cat = bk ? getCat(bk) : null;
              const isAvail = available.includes(d);
              const isPending = pendingDays.includes(d);
              const isBlocked = blockedDays.includes(d);
              return (
                <DayCell
                  key={d} day={d}
                  status={bk ? "booked" : isPending ? "pending" : isBlocked ? "blocked" : isAvail ? "available" : "empty"}
                  catColor={cat?.color} catName={cat?.name}
                />
              );
            })}
          </div>

          <Divider/>
          <Row gap={12}>
            <StatPills />
          </Row>
        </Card>

        <div>
          <Card>
            <Row style={{ justifyContent: "space-between", marginBottom: 14 }}>
              <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>Incoming requests</h3>
              <Pill color="#D97706" tint="rgba(217,119,6,0.12)">3 NEW</Pill>
            </Row>
            <Stack gap={14}>
              {[
                { c: "c1", title: "Midsommar Listening", date: "May 14 · 20:00", match: 89 },
                { c: "c5", title: "Afro-Futures Film Night", date: "May 18 · 19:30", match: 76 },
                { c: "c3", title: "Neukölln Night Market", date: "May 17 · 18:00", match: 84 },
              ].map((r, i) => {
                const curator = getCurator(r.c);
                const cat = getCat(curator.cat);
                return (
                  <div key={i} style={{ padding: 12, borderRadius: 10, background: "var(--wd-pg)", border: "1px solid var(--wd-line)", position: "relative", overflow: "hidden" }}>
                    {/* thin category stripe — identity only, not status */}
                    <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: cat.color }}/>
                    <Row gap={10} style={{ marginBottom: 10, paddingLeft: 4 }}>
                      <Avatar name={curator.name} imgSrc={curator.img} color={curator.color} size={32}/>
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 700, color: "var(--wd-ink)" }}>{curator.name}</div>
                        <div style={{ fontSize: 10, color: "var(--wd-ink-4)" }}>CPI {curator.cpi} · {curator.city} · {cat.name}</div>
                      </div>
                      <WSIScoreBadge value={r.match} size={40}/>
                    </Row>
                    <div style={{ fontSize: 12, fontWeight: 700, color: "var(--wd-ink-2)", paddingLeft: 4 }}>{r.title}</div>
                    <div style={{ fontSize: 11, color: "var(--wd-ink-4)", marginTop: 3, paddingLeft: 4 }}>{r.date}</div>
                    <Row gap={6} style={{ marginTop: 10, paddingLeft: 4 }}>
                      <Btn size="sm" variant="success" icon="check">Accept</Btn>
                      <Btn size="sm" variant="ghost">Counter</Btn>
                      <Btn size="sm" variant="quiet">Decline</Btn>
                    </Row>
                  </div>
                );
              })}
            </Stack>
          </Card>
          <Card style={{ marginTop: 20 }}>
            <h3 style={{ margin: "0 0 12px", fontSize: 15, fontWeight: 700 }}>Revenue uplift</h3>
            <div style={{ fontSize: 28, fontWeight: 700, color: "var(--wd-ink)", letterSpacing: "-0.02em" }}>+38%</div>
            <div style={{ fontSize: 12, color: "var(--wd-ink-3)", marginBottom: 10 }}>vs. baseline nights · from POS attribution</div>
            <Sparkline values={[100, 110, 130, 125, 140, 138, 155]} color="var(--wd-green-ink)" height={36}/>
            <div style={{ fontSize: 11, color: "var(--wd-ink-4)", marginTop: 8 }}>Events on weDISCOVR drive consistent above-baseline revenue.</div>
          </Card>
        </div>
      </div>
    </>
  );
};

// A single calendar cell. Status drives fill; category is a 3px left stripe.
const DayCell = ({ day, status, catColor, catName }) => {
  const cellStyles = {
    available: { bg: "rgba(126,217,87,0.14)", border: "1px solid rgba(126,217,87,0.4)", text: "var(--wd-ink)", subtext: "var(--wd-green-ink)" },
    booked:    { bg: "var(--wd-ink)",         border: "none",                          text: "#fff",           subtext: "rgba(255,255,255,0.75)" },
    pending:   { bg: "rgba(217,119,6,0.14)",  border: "1px dashed rgba(217,119,6,0.5)",text: "var(--wd-ink)",  subtext: "#D97706" },
    blocked:   { bg: "repeating-linear-gradient(135deg, var(--wd-pg-2) 0 6px, var(--wd-pg) 6px 12px)", border: "1px solid var(--wd-line-2)", text: "var(--wd-ink-4)", subtext: "var(--wd-ink-4)" },
    empty:     { bg: "var(--wd-surface)",     border: "1px solid var(--wd-line)",      text: "var(--wd-ink-3)",subtext: "var(--wd-ink-4)" },
  };
  const s = cellStyles[status];
  const subLabel =
    status === "available" ? "Open" :
    status === "booked"    ? catName :
    status === "pending"   ? "Review" :
    status === "blocked"   ? "Blocked" : "";

  return (
    <div style={{
      aspectRatio: "1", borderRadius: 8,
      background: s.bg, border: s.border,
      display: "flex", flexDirection: "column", justifyContent: "space-between",
      padding: 8, cursor: "pointer", position: "relative", overflow: "hidden",
    }}>
      {status === "booked" && catColor && (
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: catColor }}/>
      )}
      <div style={{ fontSize: 13, fontWeight: 700, color: s.text, paddingLeft: status === "booked" ? 4 : 0 }}>{day}</div>
      {subLabel && (
        <div style={{ fontSize: 9, color: s.subtext, fontWeight: 700, letterSpacing: "0.04em", textTransform: "uppercase", paddingLeft: status === "booked" ? 4 : 0 }}>
          {subLabel}
        </div>
      )}
    </div>
  );
};

// Little legend swatches that visually match the cells exactly.
const LegendChip = ({ swatch, label }) => {
  const swatches = {
    avail:   { bg: "rgba(126,217,87,0.14)", bd: "1px solid rgba(126,217,87,0.5)" },
    booked:  { bg: "var(--wd-ink)",         bd: "none" },
    pending: { bg: "rgba(217,119,6,0.14)",  bd: "1px dashed rgba(217,119,6,0.5)" },
    blocked: { bg: "repeating-linear-gradient(135deg, var(--wd-pg-2) 0 3px, var(--wd-pg) 3px 6px)", bd: "1px solid var(--wd-line-2)" },
  };
  const s = swatches[swatch];
  return (
    <Row gap={6}>
      <span style={{ width: 12, height: 12, borderRadius: 3, background: s.bg, border: s.bd }}/>
      <span style={{ fontSize: 11, color: "var(--wd-ink-3)" }}>{label}</span>
    </Row>
  );
};

const StatPills = () => (
  <>
    <div style={{ flex: 1 }}>
      <div style={{ fontSize: 11, color: "var(--wd-ink-4)", fontWeight: 700, letterSpacing: "0.06em" }}>OPEN SLOTS</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: "var(--wd-ink)", marginTop: 4 }}>12</div>
    </div>
    <div style={{ flex: 1 }}>
      <div style={{ fontSize: 11, color: "var(--wd-ink-4)", fontWeight: 700, letterSpacing: "0.06em" }}>BOOKED</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: "var(--wd-ink)", marginTop: 4 }}>7</div>
    </div>
    <div style={{ flex: 1 }}>
      <div style={{ fontSize: 11, color: "var(--wd-ink-4)", fontWeight: 700, letterSpacing: "0.06em" }}>SVI</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: "var(--wd-ink)", marginTop: 4 }}>84</div>
    </div>
    <div style={{ flex: 1 }}>
      <div style={{ fontSize: 11, color: "var(--wd-ink-4)", fontWeight: 700, letterSpacing: "0.06em" }}>UTILIZATION</div>
      <div style={{ fontSize: 22, fontWeight: 700, color: "var(--wd-ink)", marginTop: 4 }}>58%</div>
    </div>
  </>
);

Object.assign(window, { SpaceCalendar });
</script>

<script type="text/babel">
// BRLO multi-capability shell. Replaces Sidebar for this persona.
// Design: left nav is capability-neutral (profile, inbox, settings),
// but CAPABILITY TABS sit at the top of the content area with color accents.

};

  { id: "inbox",     label: "Inbox",   icon: "bell",     cap: null },        // merged

        </div>
      </Row>

      <div style={{ fontSize: 10, color: dark ? "rgba(255,255,255,0.4)" : "var(--wd-ink-4)", fontWeight: 700, letterSpacing: "0.1em", padding: "12px 10px 8px" }}>

<script type="text/babel">
// Entity onboarding flow — single- and multi-capability.
// A 4-step wizard: identity → capabilities → per-capability details → confirm.

const Onboarding = ({ onExit }) => {
  const [step, setStep] = useState(0);
  const [caps, setCaps] = useState([]);
  const [entity, setEntity] = useState({ name: "", city: "Berlin", tagline: "" });

  const steps = ["Identity", "Capabilities", "Details", "Confirm"];
  const toggle = (c) => setCaps(caps.includes(c) ? caps.filter(x => x !== c) : [...caps, c]);

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 200, background: "var(--wd-pg)", display: "flex", flexDirection: "column", overflowY: "auto" }}>
      {/* Top progress bar */}
      <div style={{
        background: "var(--wd-surface)", borderBottom: "1px solid var(--wd-line)",
        padding: "14px 32px", display: "flex", alignItems: "center", justifyContent: "space-between",
      }}>
        <Row gap={10}>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: "#0066FF", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 800, fontSize: 12, letterSpacing: "-0.03em" }}>wD</div>
          <span style={{ fontSize: 13, fontWeight: 700, color: "var(--wd-ink)" }}>Join weDISCOVR</span>
        </Row>
        <Row gap={16}>
          {steps.map((s, i) => (
            <Row key={s} gap={6}>
              <span style={{
                width: 20, height: 20, borderRadius: 10,
                background: i <= step ? "#0066FF" : "var(--wd-pg-2)",
                color: i <= step ? "#fff" : "var(--wd-ink-4)",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 10, fontWeight: 700,
              }}>{i + 1}</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: i <= step ? "var(--wd-ink)" : "var(--wd-ink-4)" }}>{s}</span>
              {i < steps.length - 1 && <span style={{ width: 24, height: 1, background: "var(--wd-line-2)", marginLeft: 10 }}/>}
            </Row>
          ))}
        </Row>
        <button onClick={onExit} style={{ padding: "6px 12px", border: "1px solid var(--wd-line-2)", borderRadius: 8, background: "transparent", fontSize: 12, color: "var(--wd-ink-3)", cursor: "pointer", fontFamily: "Nunito" }}>Exit demo</button>
      </div>

      <div style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 40 }}>
        <div style={{ width: "100%", maxWidth: 720 }}>
          {step === 0 && <StepIdentity entity={entity} setEntity={setEntity}/>}
          {step === 1 && <StepCapabilities caps={caps} toggle={toggle}/>}
          {step === 2 && <StepDetails caps={caps}/>}
          {step === 3 && <StepConfirm entity={entity} caps={caps}/>}
          <Row gap={10} style={{ justifyContent: "space-between", marginTop: 32 }}>
            <Btn variant="ghost" onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0}>← Back</Btn>
            {step < 3 ? (
              <Btn size="lg" onClick={() => setStep(step + 1)} disabled={step === 1 && caps.length === 0}>
                Continue →
              </Btn>
            ) : (
              <Btn size="lg" variant="success" icon="check" onClick={onExit}>Enter dashboard</Btn>
            )}
          </Row>
        </div>
      </div>
    </div>
  );
};

const StepIdentity = ({ entity, setEntity }) => (
  <div>
    <h1 style={{ fontSize: 32, fontWeight: 700, letterSpacing: "-0.02em", margin: 0 }}>Welcome. Who are you?</h1>
    <p style={{ fontSize: 15, color: "var(--wd-ink-3)", marginTop: 10, marginBottom: 28 }}>Start with the basics. You'll pick what you <em>do</em> next.</p>
    <Stack gap={14}>
      <Field label="Entity name" required><Input value={entity.name} onChange={v => setEntity({...entity, name: v})} placeholder="e.g. BRLO, DJ Kleo, Amazingy…"/></Field>
      <Field label="City"><Input value={entity.city} onChange={v => setEntity({...entity, city: v})}/></Field>
      <Field label="One-line tagline" hint="Shown on your public profile."><Input value={entity.tagline} onChange={v => setEntity({...entity, tagline: v})} placeholder="e.g. Kreuzberg brewery + taproom"/></Field>
    </Stack>
  </div>
);

const StepCapabilities = ({ caps, toggle }) => {
  const options = [
    { id: "curator", label: "Curate events",     desc: "Run cultural nights, supper clubs, listening sessions, workshops.", example: "DJs, chefs, foundations" },
    { id: "space",   label: "Host at my venue",  desc: "Open a physical space to curators and receive booking requests.", example: "Breweries, galleries, showrooms" },
    { id: "brand",   label: "Sponsor events",    desc: "Buy guaranteed wEID attention at relevant cultural events.",     example: "Beauty brands, breweries, auto" },
    { id: "talent",  label: "Offer talent / services", desc: "Make yourself bookable for other curators' events.",      example: "DJs, speakers, caterers" },
  ];
  return (
    <div>
      <h1 style={{ fontSize: 32, fontWeight: 700, letterSpacing: "-0.02em", margin: 0 }}>What do you do?</h1>
      <p style={{ fontSize: 15, color: "var(--wd-ink-3)", marginTop: 10, marginBottom: 28 }}>Pick one or more. You can always add capabilities later. <strong>Multiple = one unified dashboard.</strong></p>
      <Stack gap={10}>
        {options.map(o => {
          const C = CAPABILITY[o.id];
          const on = caps.includes(o.id);
          return (

  });
  const [showTweaks, setShowTweaks] = useState(false);
  const [page, setPage] = useState(() => localStorage.getItem("wd_platform_page") || "dashboard");
  const [cap, setCap] = useState("space");
  const [eventOpen, setEventOpen] = useState(null);
  const [showOnboarding, setShowOnboarding] = useState(() => localStorage.getItem("wd_demo_onboarding") === "1");
  const [showHandoff, setShowHandoff] = useState(() => localStorage.getItem("wd_demo_handoff") === "1");
  const [showExpand, setShowExpand] = useState(false);

  const updateTweak = (k, v) => {
    const n = { ...tweaks, [k]: v };
    setTweaks(n);
    localStorage.setItem("wd_platform_tweaks", JSON.stringify(n));
    window.parent.postMessage({type: "__edit_mode_set_keys", edits: { [k]: v }}, "*");
  };
  const updatePage = (p) => { setPage(p); localStorage.setItem("wd_platform_page", p); setEventOpen(null); };

  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({type: "__edit_mode_available"}, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const isBRLO = tweaks.role === "brlo";
  const currentNav = isBRLO ? BRLO_NAV : NAV[tweaks.role];
  const validPages = currentNav ? currentNav.map(i => i.id) : ["dashboard"];
  const safePage = validPages.includes(page) ? page : validPages[0];

  useEffect(() => {
    if (safePage !== page) updatePage(safePage);
  }, [tweaks.role]);

  const titleMap = {
    curator: { dashboard: ["Dashboard", "Curator · Berlin · Neukölln"], create: ["Create Event", "Build brief + route to space and brand"], events: ["My Events", "Upcoming, past and drafts"], earnings: ["Earnings", "Reconciled monthly"], sponsors: ["Sponsors", "Brand matches in your feed"], settings: ["Settings", "Profile, payouts, preferences"] },
    brand:   { feed: ["Sponsor Feed", "Live events matching your brand profile"], recall: ["Recall Studio", "AR activation + micro-experience"], insurance: ["Attention Insurance", "Guaranteed wEID pool"], report: ["Campaign Report", "Spring Beauty Drops · Apr 2026"], assets: ["Brand Assets", "Logos, packshots, 3D"], settings: ["Settings", "Brand profile"] },
    space:   { calendar: ["Calendar", "Urban Spree · Friedrichshain"], requests: ["Requests", "Pending from curators"], events: ["Events", "Hosted history"], revenue: ["Revenue", "POS attribution"], warehouse: ["Flex Warehouse", "Brand storage income"], settings: ["Settings", "Space profile"] },
    ops:     { qa: ["QA Queue", "Events awaiting review"], events: ["All Events", "Platform-wide"], entities: ["Entities", "Curators, spaces, brands"], wsi: ["wSI Monitor", "Signal-index health"], settings: ["Settings", "Platform"] },
  };
  const [title, sub] = !isBRLO ? (titleMap[tweaks.role]?.[safePage] || ["", ""]) : ["", ""];

  const renderBRLO = () => (
    <BRLOShell page={safePage} setPage={updatePage} cap={cap} setCap={setCap} tweaks={tweaks}>
      {safePage === "dashboard" && <BRLODashboard setPage={updatePage} setCap={setCap} />}
      {safePage === "inbox" && <BRLOInbox />}
      {safePage === "calendar" && <SpaceCalendar />}
      {safePage === "feed" && !eventOpen && <SponsorFeed onOpenEvent={setEventOpen} wsiVariant={tweaks.wsiVariant}/>}
      {safePage === "feed" && eventOpen   && <EventDetail ev={eventOpen} onBack={() => setEventOpen(null)} wsiVariant={tweaks.wsiVariant}/>}
      {safePage === "recall" && <RecallStudio />}
      {safePage === "report" && <CampaignReport />}
      {safePage === "profile" && <BRLOProfile />}
      {safePage === "settings" && <Placeholder label="Settings" />}
    </BRLOShell>
  );

  return (
    <>
      {isBRLO ? renderBRLO() : (
        <Shell role={tweaks.role} page={safePage} setPage={updatePage} shell={tweaks.shellVariant} title={title} sub={sub}>
          {tweaks.role === "curator" && safePage === "dashboard" && <CuratorDashboard setPage={updatePage} wsiVariant={tweaks.wsiVariant}/>}
          {tweaks.role === "curator" && safePage === "create"    && <CreateEvent onCancel={() => updatePage("dashboard")} onDone={() => updatePage("events")}/>}
          {tweaks.role === "curator" && safePage === "earnings"  && <Earnings/>}
          {tweaks.role === "curator" && (safePage === "events" || safePage === "sponsors" || safePage === "settings") && <Placeholder label={titleMap.curator[safePage][0]} />}

          {tweaks.role === "brand" && safePage === "feed" && !eventOpen && <SponsorFeed onOpenEvent={setEventOpen} wsiVariant={tweaks.wsiVariant}/>}
          {tweaks.role === "brand" && safePage === "feed" && eventOpen   && <EventDetail ev={eventOpen} onBack={() => setEventOpen(null)} wsiVariant={tweaks.wsiVariant}/>}
          {tweaks.role === "brand" && safePage === "recall" && <RecallStudio/>}
          {tweaks.role === "brand" && safePage === "report" && <CampaignReport/>}
          {tweaks.role === "brand" && (safePage === "insurance" || safePage === "assets" || safePage === "settings") && <Placeholder label={titleMap.brand[safePage][0]}/>}

          {tweaks.role === "space" && safePage === "calendar" && <SpaceCalendar/>}
          {tweaks.role === "space" && safePage !== "calendar" && <Placeholder label={titleMap.space[safePage][0]}/>}

          {tweaks.role === "ops" && safePage === "qa" && <QAQueue wsiVariant={tweaks.wsiVariant}/>}
          {tweaks.role === "ops" && safePage !== "qa" && <Placeholder label={titleMap.ops[safePage][0]}/>}
        </Shell>
      )}

      {/* Role switcher — includes BRLO as a multi-cap persona */}
      <div style={{
        position: "fixed", bottom: 24, right: 24, zIndex: 100,
        background: "#0B1220", borderRadius: 14, padding: 6,
        boxShadow: "0 12px 32px rgba(0,0,0,0.25)",
        display: "flex", gap: 2,
      }}>
        {[...ROLES, { id: "brlo", label: "BRLO", color: "#FF5501", isMulti: true }].map(r => (
          <button key={r.id} onClick={() => updateTweak("role", r.id)}
            style={{
              padding: "8px 14px", border: "none",
              background: tweaks.role === r.id ? "rgba(255,255,255,0.15)" : "transparent",
              color: tweaks.role === r.id ? "#fff" : "rgba(255,255,255,0.5)",
              borderRadius: 10, fontFamily: "Nunito", fontSize: 12, fontWeight: 700, cursor: "pointer",
              display: "flex", alignItems: "center", gap: 6, position: "relative",
            }}>
            {r.isMulti ? (
              <span style={{ display: "flex", width: 8, height: 8, borderRadius: 4, overflow: "hidden" }}>
                <span style={{ flex: 1, background: "#7ED957" }} />
                <span style={{ flex: 1, background: "#FF5501" }} />
              </span>
            ) : (
              <span style={{ width: 8, height: 8, borderRadius: 4, background: r.color }}/>
            )}
            {r.label}
            {r.isMulti && <span style={{ fontSize: 8, fontWeight: 800, padding: "1px 4px", borderRadius: 4, background: "rgba(255,255,255,0.2)", letterSpacing: "0.06em" }}>MULTI</span>}
          </button>
        ))}
      </div>

      {/* Tweaks toggle — only rendered when running standalone (no design-tool harness). */}
      {window.parent === window && (
        <button onClick={() => setShowTweaks(t => !t)} style={{
          position: "fixed", bottom: 24, left: 24, zIndex: 100,
          background: "#0B1220", color: "#fff", border: "none",
          padding: "10px 14px", borderRadius: 12,
          fontFamily: "Nunito", fontSize: 12, fontWeight: 700, cursor: "pointer",
          boxShadow: "0 12px 32px rgba(0,0,0,0.25)",
          display: "flex", alignItems: "center", gap: 8,
        }}>
          <Icon name="settings" size={14} /> Tweaks
        </button>
      )}

      <DemoNav
        tweaks={tweaks}
        updateTweak={updateTweak}
        updatePage={updatePage}
        currentPage={safePage}
        onShowOnboarding={() => setShowOnboarding(true)}
        onShowHandoff={() => setShowHandoff(true)}
      />

      {showTweaks && <TweaksPanel tweaks={tweaks} update={updateTweak} onShowOnboarding={() => setShowOnboarding(true)} onShowExpand={() => setShowExpand(true)} onShowHandoff={() => setShowHandoff(true)} />}

      {showOnboarding && <Onboarding onExit={() => { setShowOnboarding(false); localStorage.removeItem("wd_demo_onboarding"); }} />}
      {showHandoff && isBRLO && <HandoffModal req={BRLO_INBOX[0]} onClose={() => { setShowHandoff(false); localStorage.removeItem("wd_demo_handoff"); }} onGoSponsor={() => { setShowHandoff(false); localStorage.removeItem("wd_demo_handoff"); updatePage("recall"); }} />}
      {showExpand && <CapabilityExpand onClose={() => setShowExpand(false)} />}
    </>
  );
};

const TweaksPanel = ({ tweaks, update, onShowOnboarding, onShowExpand, onShowHandoff }) => (
  <div style={{
    position: "fixed", bottom: 72, left: 24, zIndex: 100, width: 280,
    background: "#0B1220", borderRadius: 14, padding: 16,
    boxShadow: "0 12px 32px rgba(0,0,0,0.35)", color: "#fff",
  }}>
    <div style={{ fontSize: 12, fontWeight: 700, letterSpacing: "0.08em", color: "rgba(255,255,255,0.5)", marginBottom: 14 }}>TWEAKS</div>
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", marginBottom: 6 }}>Demo flows</div>
      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
        <button onClick={onShowOnboarding} style={{ padding: "8px 12px", border: "none", borderRadius: 8, background: "rgba(255,255,255,0.08)", color: "#fff", fontFamily: "Nunito", fontSize: 11, fontWeight: 700, cursor: "pointer", textAlign: "left" }}>▶ Onboarding wizard</button>
        <button onClick={onShowHandoff} style={{ padding: "8px 12px", border: "none", borderRadius: 8, background: "rgba(255,255,255,0.08)", color: "#fff", fontFamily: "Nunito", fontSize: 11, fontWeight: 700, cursor: "pointer", textAlign: "left" }}>▶ Cross-cap handoff</button>
        <button onClick={onShowExpand} style={{ padding: "8px 12px", border: "none", borderRadius: 8, background: "rgba(255,255,255,0.08)", color: "#fff", fontFamily: "Nunito", fontSize: 11, fontWeight: 700, cursor: "pointer", textAlign: "left" }}>▶ Add capability</button>
      </div>
    </div>
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", marginBottom: 6 }}>Shell variant</div>
      <div style={{ display: "flex", gap: 4 }}>
        {[["light","Light"],["hybrid","Hybrid"]].map(([v, l]) => (
          <button key={v} onClick={() => update("shellVariant", v)} style={{
            flex: 1, padding: "8px 0", border: "none", borderRadius: 8,
            background: tweaks.shellVariant === v ? "#0066FF" : "rgba(255,255,255,0.08)",
            color: "#fff", fontFamily: "Nunito", fontSize: 12, fontWeight: 700, cursor: "pointer",
          }}>{l}</button>
        ))}
      </div>
    </div>
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", marginBottom: 6 }}>wSI visualization</div>
      <div style={{ display: "flex", gap: 4 }}>
        {[["bars","Bars"],["radar","Radar"],["reasons","Reasons"]].map(([v, l]) => (
          <button key={v} onClick={() => update("wsiVariant", v)} style={{
            flex: 1, padding: "8px 0", border: "none", borderRadius: 8,
            background: tweaks.wsiVariant === v ? "#0066FF" : "rgba(255,255,255,0.08)",
            color: "#fff", fontFamily: "Nunito", fontSize: 11, fontWeight: 700, cursor: "pointer",
          }}>{l}</button>
        ))}
      </div>
    </div>
  </div>
);

const Placeholder = ({ label }) => (
  <>
    <PageHeader title={label} sub="Screen stubbed."/>
    <Card padding={48} style={{ textAlign: "center" }}>
      <Icon name="layers" size={32} color="var(--wd-ink-4)" style={{ margin: "0 auto 14px" }}/>
      <div style={{ fontSize: 15, fontWeight: 700, color: "var(--wd-ink)" }}>{label}</div>
    </Card>
  </>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
