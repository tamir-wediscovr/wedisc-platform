<!doctype html>
<html><head><meta charset="utf-8">
<title>weDISCOVR — Explorer UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#050A14;min-height:100vh;font-family:Nunito;color:#fff;overflow:auto}
.stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
#root{filter:drop-shadow(0 40px 80px rgba(0,0,0,0.5))}
.sidebar{position:fixed;top:20px;left:20px;font-size:10px;color:rgba(255,255,255,0.5);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;z-index:50}
.nav{position:fixed;top:20px;right:20px;display:flex;flex-direction:column;gap:6px;z-index:50;background:rgba(10,22,40,0.8);padding:12px;border-radius:12px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08)}
.nav button{font-family:Nunito;font-size:11px;font-weight:700;padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;text-align:left}
.nav button:hover{background:rgba(255,255,255,0.06);color:#fff}
.nav .lbl{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px}
</style>
</head>
<body>
<div class="sidebar">weDISCOVR · Explorer · iPhone 16 Pro · 402×874</div>
<div class="nav">
  <div class="lbl">Jump to screen</div>
  <button onclick="localStorage.setItem('wd_screen','home');location.reload()">Home</button>
  <button onclick="localStorage.setItem('wd_screen','drops');location.reload()">Drops</button>
  <button onclick="localStorage.setItem('wd_screen','event');location.reload()">Event Detail</button>
  <button onclick="localStorage.setItem('wd_screen','gift');location.reload()">Caught Gift</button>
</div>
<div class="stage"><div id="root"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="./Primitives.jsx"></script>
<script type="text/babel" src="./Chrome.jsx"></script>
<script type="text/babel" src="./Home.jsx"></script>
<script type="text/babel" src="./Drops.jsx"></script>
<script type="text/babel" src="./EventDetail.jsx"></script>
<script type="text/babel" src="./CaughtGift.jsx"></script>
<script type="text/babel" src="./App.jsx"></script>
</body></html>
